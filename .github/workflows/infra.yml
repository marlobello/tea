name: Deploy Infrastructure (Bicep)

# Provisions/updates the Azure infrastructure (rg-tea + Static Web App) via Bicep.
# Uses passwordless OIDC auth (no stored Azure credentials).

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/infra.yml'
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    name: Deploy Bicep
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate (what-if)
        uses: azure/cli@v2
        with:
          inlineScript: |
            az deployment sub what-if \
              --location southcentralus \
              --template-file infra/main.bicep \
              --parameters infra/main.parameters.json

      - name: Deploy
        uses: azure/cli@v2
        with:
          inlineScript: |
            az deployment sub create \
              --name tea-infra-${{ github.run_number }} \
              --location southcentralus \
              --template-file infra/main.bicep \
              --parameters infra/main.parameters.json \
              --query "properties.outputs.defaultHostname.value" -o tsv
